<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disc Golf Social · Brian · Reese · Jacob</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d0f14;
            --surface: rgba(255,255,255,0.04);
            --surface2: rgba(255,255,255,0.07);
            --border: rgba(255,255,255,0.08);
            --text: #f1f5f9;
            --text2: #94a3b8;
            --text3: #475569;
            --accent: #818cf8;
            --accent-dim: rgba(129,140,248,0.1);
            --accent-border: rgba(129,140,248,0.25);
            --green: #4ade80;
            --orange: #fb923c;
            --red: #f87171;
            --gold: #fbbf24;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding-bottom: 60px;
        }
        body::before {
            content: '';
            position: fixed;
            top: -20%; left: -10%;
            width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(129,140,248,0.06) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
        }

        /* ── TOPBAR ── */
        .topbar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(13,15,20,0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px;
        }
        .topbar-left { display: flex; align-items: center; gap: 10px; }
        .topbar-icon { font-size: 1.4rem; line-height: 1; }
        .topbar-title { font-family: 'Outfit', sans-serif; font-size: 1.05rem; font-weight: 700; color: var(--text); }
        .topbar-sub { font-size: 0.72rem; color: var(--text3); margin-top: 1px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em; }
        .topbar-right { display: flex; align-items: center; gap: 8px; }
        .live-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px rgba(74,222,128,0.6);
            animation: pulse-dot 2s ease-in-out infinite;
        }
        .live-label { font-size: 0.7rem; color: var(--green); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.06em; }
        @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* ── CONTAINER ── */
        .container { max-width: 520px; margin: 0 auto; padding: 20px 16px 0; position: relative; z-index: 1; }

        /* ── PLAYER STAT CARDS ── */
        .players-strip {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 10px; margin-bottom: 24px;
        }
        .player-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 10px;
            text-align: center;
            transition: border-color 0.2s;
        }
        .player-card:hover { border-color: var(--accent-border); }
        .player-avatar-wrap { position: relative; display: inline-block; margin-bottom: 8px; }
        .player-avatar {
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Outfit', sans-serif; font-weight: 800;
            font-size: 1.1rem; margin: 0 auto;
            border: 2px solid transparent;
        }
        .player-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; display:block; }
        .player-crown {
            position: absolute; top: -8px; right: -4px;
            font-size: 0.85rem; line-height: 1;
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));
        }
        .player-name { font-size: 0.78rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }
        .player-stats { display: flex; flex-direction: column; gap: 3px; }
        .player-stat-row { display: flex; justify-content: space-between; align-items: center; }
        .player-stat-label { font-size: 0.62rem; color: var(--text3); }
        .player-stat-val { font-size: 0.72rem; font-weight: 600; font-family: 'JetBrains Mono', monospace; }

        /* ── SECTION HEADER ── */
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 14px;
        }
        .section-title { font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; }
        .round-count { font-size: 0.72rem; color: var(--text3); font-family: 'JetBrains Mono', monospace; }

        /* ── FEED ── */
        .feed { display: flex; flex-direction: column; gap: 12px; }

        /* ── ROUND CARD ── */
        .round-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: border-color 0.2s, transform 0.15s;
        }
        .round-card:hover { border-color: rgba(255,255,255,0.14); transform: translateY(-1px); }

        .round-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 16px 10px;
            border-bottom: 1px solid var(--border);
        }
        .round-header-left { display: flex; align-items: center; gap: 10px; }
        .round-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 0.95rem;
            font-family: 'Outfit', sans-serif;
            flex-shrink: 0;
        }
        .round-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; display:block; }
        .round-winner-label { font-size: 0.67rem; color: var(--text3); margin-bottom: 1px; text-transform: uppercase; letter-spacing: 0.05em; }
        .round-winner-name { font-size: 0.95rem; font-weight: 700; color: var(--text); }
        .round-meta { text-align: right; }
        .round-date { font-size: 0.72rem; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
        .round-course { font-size: 0.75rem; color: var(--text2); margin-top: 2px; max-width: 120px; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .round-players { padding: 10px 16px 14px; }
        .round-player-row {
            display: flex; align-items: center; gap: 10px;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
        }
        .round-player-row:last-child { border-bottom: none; }
        .round-player-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .round-player-name { flex: 1; font-size: 0.82rem; color: var(--text2); }
        .round-player-name.is-winner { color: var(--text); font-weight: 600; }
        .round-player-score {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem; font-weight: 600;
            min-width: 32px; text-align: right;
        }
        .round-player-thru { font-size: 0.68rem; color: var(--text3); min-width: 28px; text-align: right; }
        .round-player-winner-icon { font-size: 0.85rem; }

        .round-footer {
            padding: 8px 16px;
            background: rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: space-between;
        }
        .round-footer-info { font-size: 0.67rem; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
        .round-holes-badge {
            font-size: 0.67rem; color: var(--text3);
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 2px 7px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: var(--text3);
        }
        .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }
        .empty-title { font-family: 'Outfit', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--text2); margin-bottom: 8px; }
        .empty-sub { font-size: 0.82rem; line-height: 1.6; }

        /* ── LOADING STATE ── */
        .loading-state {
            text-align: center;
            padding: 40px 24px;
        }
        .loading-spinner {
            width: 28px; height: 28px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 0.8rem; color: var(--text3); }

        /* ── YEAR LEADERBOARD ── */
        .year-lb {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        .year-lb-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 8px;
        }
        .year-lb-title { font-family: 'Outfit', sans-serif; font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text2); }
        .year-lb-year { font-size: 0.72rem; color: var(--text3); font-family: 'JetBrains Mono', monospace; margin-left: auto; }
        .year-lb-row {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
        }
        .year-lb-row:last-child { border-bottom: none; }
        .year-lb-rank { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 0.9rem; width: 20px; text-align: center; }
        .year-lb-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem; font-family: 'Outfit', sans-serif; flex-shrink: 0; }
        .year-lb-name { flex: 1; font-size: 0.82rem; font-weight: 600; }
        .year-lb-stat { text-align: right; }
        .year-lb-wins { font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; font-weight: 700; color: var(--gold); }
        .year-lb-rounds { font-size: 0.67rem; color: var(--text3); margin-top: 1px; }

        /* ── SCORECARD LINKS ── */
        .scorecards-strip {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; margin-bottom: 28px;
        }
        .sc-link {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 14px;
            text-decoration: none;
            transition: border-color 0.2s, transform 0.15s;
            display: block;
        }
        .sc-link:hover { border-color: rgba(255,255,255,0.14); transform: translateY(-1px); }
        .sc-link-icon { font-size: 1.4rem; margin-bottom: 6px; display: block; }
        .sc-link-name { font-size: 0.82rem; font-weight: 600; color: var(--text); display: block; }
        .sc-link-sub { font-size: 0.7rem; color: var(--text3); display: block; margin-top: 2px; }

        /* ── WINNER BADGE ── */
        .winner-tag {
            display: inline-flex; align-items: center; gap: 4px;
            background: rgba(251,191,36,0.12);
            border: 1px solid rgba(251,191,36,0.25);
            border-radius: 6px;
            padding: 2px 7px;
            font-size: 0.67rem;
            color: var(--gold);
            font-family: 'JetBrains Mono', monospace;
        }

        /* ── CONNECTION STATUS ── */
        .conn-status {
            font-size: 0.7rem;
            color: var(--text3);
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
            padding: 8px;
            margin-top: 16px;
        }
        .conn-status.error { color: var(--red); }
    </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="topbar-left">
        <div class="topbar-icon">🥏</div>
        <div>
            <div class="topbar-title">Disc Golf Social</div>
            <div class="topbar-sub">Brian · Reese · Jacob</div>
        </div>
    </div>
    <div class="topbar-right">
        <div class="live-dot"></div>
        <div class="live-label">LIVE</div>
    </div>
</div>

<div class="container">

    <!-- PLAYER STAT CARDS -->
    <div class="players-strip" id="playersStrip">
        <!-- filled by JS -->
        <div class="player-card"><div class="player-avatar" style="background:rgba(74,222,128,0.12);color:#4ade80;border-color:rgba(74,222,128,0.3);">B</div><div class="player-name">Brian</div><div class="player-stats"><div class="player-stat-row"><span class="player-stat-label">Wins</span><span class="player-stat-val" style="color:#fbbf24;">—</span></div><div class="player-stat-row"><span class="player-stat-label">Rounds</span><span class="player-stat-val">—</span></div><div class="player-stat-row"><span class="player-stat-label">Best</span><span class="player-stat-val" style="color:#4ade80;">—</span></div></div></div>
        <div class="player-card"><div class="player-avatar" style="background:rgba(129,140,248,0.12);color:#818cf8;border-color:rgba(129,140,248,0.3);">R</div><div class="player-name">Reese</div><div class="player-stats"><div class="player-stat-row"><span class="player-stat-label">Wins</span><span class="player-stat-val" style="color:#fbbf24;">—</span></div><div class="player-stat-row"><span class="player-stat-label">Rounds</span><span class="player-stat-val">—</span></div><div class="player-stat-row"><span class="player-stat-label">Best</span><span class="player-stat-val" style="color:#4ade80;">—</span></div></div></div>
        <div class="player-card"><div class="player-avatar" style="background:rgba(251,146,60,0.12);color:#fb923c;border-color:rgba(251,146,60,0.3);">J</div><div class="player-name">Jacob</div><div class="player-stats"><div class="player-stat-row"><span class="player-stat-label">Wins</span><span class="player-stat-val" style="color:#fbbf24;">—</span></div><div class="player-stat-row"><span class="player-stat-label">Rounds</span><span class="player-stat-val">—</span></div><div class="player-stat-row"><span class="player-stat-label">Best</span><span class="player-stat-val" style="color:#4ade80;">—</span></div></div></div>
    </div>

    <!-- YEAR LEADERBOARD -->
    <div class="year-lb" id="yearLb">
        <div class="year-lb-header">
            <div class="year-lb-title">🏆 2026 Leaderboard</div>
            <div class="year-lb-year" id="lbYear">—</div>
        </div>
        <div id="yearLbRows"><div class="year-lb-row" style="justify-content:center;color:var(--text3);font-size:0.78rem;">No rounds yet</div></div>
    </div>

    <!-- FEED -->
    <div class="section-header">
        <div class="section-title">Round Feed</div>

    </div>

    <div class="feed" id="feed">

            <div class="loading-spinner"></div>

    <!-- SCORECARD LINKS -->
    <div style="margin-top:28px;">
        <div class="section-header"><div class="section-title">Play a Round</div></div>
        <div class="scorecards-strip">
            <a href="disc-golf-scorecard.html" class="sc-link">
                <span class="sc-link-icon">🥏</span>
                <span class="sc-link-name">Standard</span>

            </a>
            <a href="disc-golf-ptp.html" class="sc-link">
                <span class="sc-link-icon">📱</span>

    <div id="connStatus" class="conn-status"></div>

</div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
    /* ── FIREBASE INIT ── */
    const firebaseConfig = {
        apiKey: "AIzaSyCquL5kjOUUhsIfDWT7OGVk43nXwV1tsYM",
        authDomain: "disc-golf-social-29d4e.firebaseapp.com",
        databaseURL: "https://disc-golf-social-29d4e-default-rtdb.firebaseio.com",
        projectId: "disc-golf-social-29d4e",
        storageBucket: "disc-golf-social-29d4e.firebasestorage.app",
        messagingSenderId: "474216201543",
        appId: "1:474216201543:web:54e118b2354d35628f6062"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    /* ── PLAYER COLOR MAP ── */
    function playerColor(name) {
        const map = { brian:'#4ade80', reese:'#818cf8', jacob:'#fb923c' };
        return map[(name||'').toLowerCase()] || '#38bdf8';
    }
    function playerInitial(name) { return (name||'?').charAt(0).toUpperCase(); }

    /* ── AVATAR ── */
    function getAvatar(name) {
        try {
            const key = 'dg_av_' + (name||'').toLowerCase().replace(/\s+/g,'_');
            return localStorage.getItem(key) || null;
        } catch(e) { return null; }
    }
    function avatarHtml(name, size) {
        const color = playerColor(name);
        const photo = getAvatar(name);
        const bg = color + '22';
        if (photo) return `<img src="${photo}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;display:block;">`;
        return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${bg};color:${color};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:${Math.round(size*0.42)}px;font-family:'Outfit',sans-serif;">${playerInitial(name)}</div>`;
    }

    /* ── HELPERS ── */
    function relStr(r) {
        if (r === 0) return 'E';
        return (r > 0 ? '+' : '') + r;
    }
    function relColor(r) {
        if (r < 0) return '#4ade80';
        if (r > 0) return '#f87171';
        return '#94a3b8';
    }
    function timeAgo(ts) {
        const diff = Date.now() - ts;
        const mins = Math.floor(diff / 60000);
        if (mins < 1) return 'just now';
        if (mins < 60) return mins + 'm ago';
        const hrs = Math.floor(mins / 60);
        if (hrs < 24) return hrs + 'h ago';
        const days = Math.floor(hrs / 24);
        if (days < 7) return days + 'd ago';
        return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    }

    /* ── STATS COMPUTATION ── */
    const KNOWN_PLAYERS = ['Brian', 'Reese', 'Jacob'];

    function computeStats(rounds) {
        const stats = {};
        KNOWN_PLAYERS.forEach(p => { stats[p] = { rounds: 0, wins: 0, best: null, totalRel: 0, roundsWithScore: 0 }; });
        rounds.forEach(round => {
            const players = round.players || [];
            players.forEach(p => {
                const n = p.name;
                if (!stats[n]) stats[n] = { rounds: 0, wins: 0, best: null, totalRel: 0, roundsWithScore: 0 };
                stats[n].rounds++;
                if (typeof p.rel === 'number') {
                    stats[n].totalRel += p.rel;
                    stats[n].roundsWithScore++;
                    if (stats[n].best === null || p.rel < stats[n].best) stats[n].best = p.rel;
                }
            });
            if (round.winner) {
                const wn = round.winner;
                if (!stats[wn]) stats[wn] = { rounds: 0, wins: 0, best: null, totalRel: 0, roundsWithScore: 0 };
                stats[wn].wins++;
            }
        });
        return stats;
    }

    function renderPlayerCards(stats) {
        const strip = document.getElementById('playersStrip');
        strip.innerHTML = KNOWN_PLAYERS.map(name => {
            const s = stats[name] || { rounds: 0, wins: 0, best: null, roundsWithScore: 0, totalRel: 0 };
            const color = playerColor(name);
            const bg = color + '22';
            const border = color + '4d';
            const avg = s.roundsWithScore > 0 ? (s.totalRel / s.roundsWithScore).toFixed(1) : null;
            return `<div class="player-card">
                <div class="player-avatar-wrap">
                    <div class="player-avatar" style="background:${bg};border-color:${border};">
                        ${avatarHtml(name, 44)}
                    </div>
                    ${s.wins > 0 ? '<div class="player-crown">👑</div>' : ''}
                </div>
                <div class="player-name">${name}</div>
                <div class="player-stats">
                    <div class="player-stat-row">
                        <span class="player-stat-label">Wins</span>
                        <span class="player-stat-val" style="color:#fbbf24;">${s.wins}</span>
                    </div>
                    <div class="player-stat-row">
                        <span class="player-stat-label">Rounds</span>
                        <span class="player-stat-val">${s.rounds}</span>
                    </div>
                    <div class="player-stat-row">
                        <span class="player-stat-label">Best</span>
                        <span class="player-stat-val" style="color:${s.best !== null ? relColor(s.best) : 'var(--text3)'};">${s.best !== null ? relStr(s.best) : '—'}</span>
                    </div>
                    ${avg !== null ? `<div class="player-stat-row"><span class="player-stat-label">Avg</span><span class="player-stat-val" style="color:${relColor(parseFloat(avg))};">${avg > 0 ? '+' : ''}${avg}</span></div>` : ''}
                </div>
            </div>`;
        }).join('');
    }

    function renderYearLeaderboard(rounds, year) {
        const stats = computeStats(rounds.filter(r => {
            if (!r.dateISO) return true;
            return r.dateISO.startsWith(String(year));
        }));
        document.getElementById('lbYear').textContent = year;
        const ranked = KNOWN_PLAYERS
            .map(name => ({ name, ...( stats[name] || { rounds:0, wins:0, best:null, totalRel:0, roundsWithScore:0 }) }))
            .sort((a,b) => {
                if (b.wins !== a.wins) return b.wins - a.wins;
                if (a.roundsWithScore && b.roundsWithScore) {
                    const aAvg = a.totalRel / a.roundsWithScore;
                    const bAvg = b.totalRel / b.roundsWithScore;
                    return aAvg - bAvg;
                }
                return b.rounds - a.rounds;
            });
        const rankEmojis = ['🥇','🥈','🥉'];
        document.getElementById('yearLbRows').innerHTML = ranked.map((p, i) => {
            const color = playerColor(p.name);
            const avg = p.roundsWithScore > 0 ? (p.totalRel / p.roundsWithScore).toFixed(1) : null;
            return `<div class="year-lb-row">
                <div class="year-lb-rank">${rankEmojis[i] || i+1}</div>
                <div class="year-lb-avatar" style="background:${color}22;color:${color};">
                    ${avatarHtml(p.name, 30)}
                </div>
                <div class="year-lb-name">${p.name}</div>
                <div class="year-lb-stat">
                    <div class="year-lb-wins">${p.wins} ${p.wins === 1 ? 'win' : 'wins'}</div>
                    <div class="year-lb-rounds">${p.rounds} rounds${avg !== null ? ' · avg ' + (avg > 0 ? '+' : '') + avg : ''}</div>
                </div>
            </div>`;
        }).join('');
    }

    function renderFeed(rounds) {
        const feed = document.getElementById('feed');
        document.getElementById('roundCount').textContent = rounds.length + ' round' + (rounds.length !== 1 ? 's' : '');

        if (rounds.length === 0) {
            feed.innerHTML = `<div class="empty-state">
                <div class="empty-icon">🥏</div>
                <div class="empty-title">No rounds posted yet</div>
                <div class="empty-sub">Finish a round on any scorecard and tap<br><strong style="color:var(--text2);">Post to Feed</strong> to share it here.</div>
            </div>`;
            return;
        }

        feed.innerHTML = rounds.map(round => {
            const players = round.players || [];
            const winner = round.winner || '';
            const wColor = playerColor(winner);
            const course = round.course || 'No course set';
            const date = round.date || '';
            const ts = round.timestamp || 0;
            const thru = round.thru || 18;

            const playerRows = players.map(p => {
                const isWinner = p.name === winner;
                const color = playerColor(p.name);
                const scoreStr = typeof p.rel === 'number' ? relStr(p.rel) : '—';
                const scoreColor = typeof p.rel === 'number' ? relColor(p.rel) : 'var(--text3)';
                return `<div class="round-player-row">
                    <div class="round-player-dot" style="background:${color};"></div>
                    ${avatarHtml(p.name, 22)}
                    <div class="round-player-name ${isWinner ? 'is-winner' : ''}">${p.name}</div>
                    <div class="round-player-score" style="color:${scoreColor};">${scoreStr}</div>
                    <div class="round-player-thru">${typeof p.strokes === 'number' ? p.strokes+'st' : ''}</div>
                    <div class="round-player-winner-icon">${isWinner ? '👑' : ''}</div>
                </div>`;
            }).join('');

            const timeLabel = ts ? timeAgo(ts) : date;

            return `<div class="round-card">
                <div class="round-header">
                    <div class="round-header-left">
                        <div class="round-avatar" style="background:${wColor}22;border:2px solid ${wColor}4d;">
                            ${avatarHtml(winner, 36)}
                        </div>
                        <div>
                            <div class="round-winner-label">Winner</div>
                            <div class="round-winner-name">${winner || '—'}</div>
                        </div>
                    </div>
                    <div class="round-meta">
                        <div class="round-date">${timeLabel}</div>
                        <div class="round-course">${course}</div>
                    </div>
                </div>
                <div class="round-players">${playerRows}</div>
                <div class="round-footer">
                    <div class="round-footer-info">${round.postedBy ? 'posted by ' + round.postedBy : ''}</div>
                    <div class="round-holes-badge">${thru}h</div>
                </div>
            </div>`;
        }).join('');
    }

    /* ── FIREBASE LISTENER ── */
    const connStatus = document.getElementById('connStatus');

    db.ref('.info/connected').on('value', snap => {
        if (snap.val()) {
            connStatus.textContent = '';
            connStatus.className = 'conn-status';
            document.querySelector('.live-dot').style.background = '#4ade80';
        } else {
            connStatus.textContent = 'Connecting...';
            connStatus.className = 'conn-status';
            document.querySelector('.live-dot').style.background = '#475569';
        }
    });

    db.ref('rounds').orderByChild('timestamp').on('value', snap => {
        const rounds = [];
        snap.forEach(child => rounds.unshift({ id: child.key, ...child.val() }));
        renderFeed(rounds);
        renderPlayerCards(computeStats(rounds));
        renderYearLeaderboard(rounds, new Date().getFullYear());
    }, err => {
        document.getElementById('feed').innerHTML = `<div class="empty-state">
            <div class="empty-icon" style="font-size:2rem;">⚠️</div>
            <div class="empty-title">Connection error</div>
            <div class="empty-sub">${err.message}</div>
        </div>`;
        connStatus.textContent = 'Firebase error: ' + err.message;
        connStatus.className = 'conn-status error';
    });
</script>
</body>
</html>
