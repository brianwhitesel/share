<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brian Whitesel</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080c14;
      --surface: #0f1623;
      --surface2: #161e2e;
      --border: #1e2d42;
      --border2: #243347;
      --accent: #3b82f6;
      --green: #10b981;
      --amber: #f59e0b;
      --purple: #8b5cf6;
      --text: #e2e8f0;
      --dim: #94a3b8;
      --muted: #4b5e78;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      padding: 0 0 80px;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed;
      top: -20%; left: 30%;
      width: 60vw; height: 60vw;
      background: radial-gradient(circle, rgba(59,130,246,0.07) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -10%; right: -5%;
      width: 50vw; height: 50vw;
      background: radial-gradient(circle, rgba(139,92,246,0.05) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    .wrap { max-width: 880px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

    /* HERO */
    .hero {
      padding: 56px 20px 48px;
      text-align: center;
      position: relative; z-index: 1;
      border-bottom: 1px solid var(--border);
      margin-bottom: 48px;
      background: linear-gradient(180deg, rgba(59,130,246,0.04) 0%, transparent 100%);
    }
    .hero-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .hero h1 {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(32px, 6vw, 52px);
      font-weight: 800;
      letter-spacing: -.03em;
      line-height: 1.05;
      margin-bottom: 12px;
    }
    .hero h1 span { color: var(--accent); }
    .hero-sub {
      color: var(--dim);
      font-size: 15px;
      max-width: 520px;
      margin: 0 auto 20px;
    }
    .updated-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 20px;
      padding: 5px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #6ee7b7;
      letter-spacing: .04em;
    }
    .updated-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #10b981;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* SECTIONS */
    .section { margin-bottom: 44px; }
    .section-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .14em;
      white-space: nowrap;
    }
    .section-line { flex: 1; height: 1px; background: var(--border); }

    /* RECENT / KNOWLEDGE CARDS */
    .recent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .recent-card {
      display: block;
      text-decoration: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      transition: border-color .15s, background .15s;
      position: relative;
      overflow: hidden;
    }
    .recent-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--purple));
      opacity: 0;
      transition: opacity .15s;
    }
    .recent-card:hover { border-color: var(--border2); background: var(--surface2); }
    .recent-card:hover::before { opacity: 1; }
    .recent-icon { font-size: 22px; margin-bottom: 10px; }
    .recent-title { font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 5px; color: var(--text); }
    .recent-desc { font-size: 12px; color: var(--dim); line-height: 1.4; }
    .new-pill {
      display: inline-block;
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: #93c5fd;
      padding: 2px 6px;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* PEOPLE CARDS */
    .people-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
      gap: 10px;
    }
    .person-card {
      display: block;
      text-decoration: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      transition: border-color .15s, background .15s;
    }
    .person-card:hover { border-color: var(--border2); background: var(--surface2); }
    .person-name { font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .person-role { font-size: 12px; color: var(--dim); }
    .person-status {
      display: inline-block;
      margin-top: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid;
    }
    .s-active   { background: rgba(16,185,129,0.1);  border-color: rgba(16,185,129,0.3);  color: #6ee7b7; }
    .s-sent     { background: rgba(59,130,246,0.1);   border-color: rgba(59,130,246,0.3);   color: #93c5fd; }
    .s-pipeline { background: rgba(245,158,11,0.1);   border-color: rgba(245,158,11,0.3);   color: #fcd34d; }
    .s-soon     { background: rgba(139,92,246,0.1);   border-color: rgba(139,92,246,0.3);   color: #c4b5fd; }

    /* TOOL CARDS */
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
    }
    .tool-card {
      display: flex;
      text-decoration: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      gap: 14px;
      align-items: flex-start;
      transition: border-color .15s, background .15s;
    }
    .tool-card:hover { border-color: var(--border2); background: var(--surface2); }
    .tool-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
    .tool-title { font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .tool-desc { font-size: 12px; color: var(--dim); line-height: 1.4; }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }

    @media(max-width:500px) {
      .hero { padding: 40px 20px 36px; }
      .recent-grid, .people-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="hero-eyebrow">Brian Whitesel · Columbus OH</div>
  <h1>Pages &amp; <span>Resources</span></h1>
  <p class="hero-sub">Tools, client pages, and research — updated automatically as new content is published.</p>
  <div class="updated-badge">
    <div class="updated-dot"></div>
    <span id="updated-text">Loading...</span>
  </div>
</div>

<div class="wrap" id="main-content">
  <div class="loading" id="loading">Loading content...</div>
</div>

<script>
(function () {

  function sc(s) {
    if (!s) return '';
    if (s === 'active') return 's-active';
    if (s === 'sent') return 's-sent';
    if (s.includes('May') || s.includes('week') || s.includes('June')) return 's-soon';
    return 's-pipeline';
  }

  function section(label, id, inner) {
    return '<div class="section" id="sec-' + id + '">'
      + '<div class="section-head"><div class="section-label">' + label + '</div><div class="section-line"></div></div>'
      + inner + '</div>';
  }

  function recentCards(items, showNew) {
    return '<div class="recent-grid">' + items.map(function(item) {
      return '<a href="' + item.href + '" class="recent-card">'
        + (showNew ? '<div class="new-pill">New</div>' : '')
        + '<div class="recent-icon">' + item.icon + '</div>'
        + '<div class="recent-title">' + item.title + '</div>'
        + '<div class="recent-desc">' + item.desc + '</div>'
        + '</a>';
    }).join('') + '</div>';
  }

  function peopleCards(items) {
    return '<div class="people-grid">' + items.map(function(item) {
      var status = item.status
        ? '<div class="person-status ' + sc(item.status) + '">' + item.status + '</div>' : '';
      return '<a href="' + item.href + '" class="person-card">'
        + '<div class="person-name">' + item.name + '</div>'
        + '<div class="person-role">' + item.role + '</div>'
        + status + '</a>';
    }).join('') + '</div>';
  }

  function toolCards(items) {
    return '<div class="tool-grid">' + items.map(function(item) {
      return '<a href="' + item.href + '" class="tool-card">'
        + '<div class="tool-icon">' + item.icon + '</div>'
        + '<div><div class="tool-title">' + item.title + '</div>'
        + '<div class="tool-desc">' + item.desc + '</div></div>'
        + '</a>';
    }).join('') + '</div>';
  }

  fetch('./manifest.json?v=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var s = data.sections;
      var html = '';
      if (s.recent    && s.recent.length)    html += section('Recently Added',            'recent',    recentCards(s.recent, true));
      if (s.knowledge && s.knowledge.length) html += section('Knowledge Base',            'knowledge', recentCards(s.knowledge, false));
      if (s.clients   && s.clients.length)   html += section('Clients',                   'clients',   peopleCards(s.clients));
      if (s.prospects && s.prospects.length) html += section('Prospects & Outreach',      'prospects', peopleCards(s.prospects));
      if (s.friends   && s.friends.length)   html += section('Friends & Collaborators',   'friends',   peopleCards(s.friends));
      if (s.tools     && s.tools.length)     html += section('Shared Tools',              'tools',     toolCards(s.tools));
      document.getElementById('main-content').innerHTML = html;
      document.getElementById('updated-text').textContent = 'Updated ' + (data.updatedLabel || data.updated);
    })
    .catch(function() {
      document.getElementById('loading').innerHTML =
        'Push to GitHub Pages to load content, or open via a local web server.';
    });

})();
</script>
</body>
</html>
