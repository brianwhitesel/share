/* BW Design System v1 — do not edit manually, maintained by design-system-enforcer */

  --bg: #080c14;
  --surface: rgba(255,255,255,0.04);

  --surface3: rgba(255,255,255,0.10);
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f1f5f9;
  --dim: #94a3b8;
  --muted: #4b5e78;
  --accent: #e41e2b;
  --blue: #3b82f6;
  --green: #34d369;
  --teal: #14b8a6;
  --amber: #f59e0b;
  --purple: #8b5cf6;
  --font-head: 'Outfit', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

}
html.light {
  --bg: #f0f2f5;

  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #0d1117;
  --dim: #475569;
  --muted: #94a3b8;
}


/* ═══════════════════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════════════════ */
:root {
  --bg:      #080c14;
  --surface: rgba(255,255,255,0.04);
  --surface2:rgba(255,255,255,0.07);
  --border:  rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text:    #f1f5f9;
  --dim:     #94a3b8;
  --muted:   #4b5e78;
  --accent:  #e41e2b;
  --blue:    #3b82f6;
  --green:   #34d369;
  --teal:    #14b8a6;
  --amber:   #f59e0b;
  --purple:  #8b5cf6;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px; line-height: 1.6;
  min-height: 100vh; padding-bottom: 100px;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* Particle dots */
.bg-particles { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.particle { position:absolute; border-radius:50%; will-change:transform,opacity; }
@keyframes pFloat {
  0%   { transform:translate(0,0) scale(1);                           opacity:var(--p-lo); }
  25%  { transform:translate(var(--px1),var(--py1)) scale(1.3);       opacity:var(--p-hi); }
  55%  { transform:translate(var(--px2),var(--py2)) scale(0.85);      opacity:var(--p-lo); }
  80%  { transform:translate(var(--px3),var(--py3)) scale(1.1);       opacity:var(--p-hi); }
  100% { transform:translate(0,0) scale(1);                           opacity:var(--p-lo); }
}

/* ═══════════════════════════════════════════════════════
   HERO
═══════════════════════════════════════════════════════ */
.hero {
  position: relative; z-index: 1;
  padding: 64px 24px 56px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  margin-bottom: 52px;
  background: linear-gradient(180deg,rgba(59,130,246,.05) 0%,transparent 100%);
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 1px; height: 100%;
  background: linear-gradient(180deg, transparent, rgba(59,130,246,.25), transparent);
}

.hero-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: .15em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 16px;
}

.hero h1 {
  font-family: 'Outfit', sans-serif;
  font-size: clamp(36px,7vw,58px);
  font-weight: 800; letter-spacing: -.03em; line-height: 1.04;
  margin-bottom: 14px;
}
.hero h1 em { color: var(--blue); font-style: normal; }

.hero-sub {
  color: var(--dim); font-size: 15px; font-weight: 400;
  max-width: 480px; margin: 0 auto 24px;
  line-height: 1.6;
}

/* Animated badge */
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(52,211,105,.08); border: 1px solid rgba(52,211,105,.22);
  border-radius: 999px; padding: 6px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; color: rgba(52,211,105,.9);
  letter-spacing: .05em;
}
.badge-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  animation: badgePulse 2.4s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes badgePulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

/* ═══════════════════════════════════════════════════════
   PAGE WRAPPER
═══════════════════════════════════════════════════════ */
.wrap { max-width: 880px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

/* ═══════════════════════════════════════════════════════
   SECTION HEADER — thin rule + JetBrains Mono label
═══════════════════════════════════════════════════════ */
.section { margin-bottom: 48px; }
.section-head {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 18px;
}
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; font-weight: 500;
  color: var(--muted); text-transform: uppercase;
  letter-spacing: .15em; white-space: nowrap;
}
.section-line { flex:1; height:1px; background: var(--border); }

/* ═══════════════════════════════════════════════════════
   RECENT / KNOWLEDGE CARDS — editorial content style
═══════════════════════════════════════════════════════ */
.recent-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
  gap: 12px;
}
.recent-card {
  display: flex; flex-direction: column;
  text-decoration: none;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 13px; padding: 0; overflow: hidden;
  transition: border-color .2s, transform .25s cubic-bezier(.16,1,.3,1), box-shadow .25s;
  position: relative;
}
.recent-card:hover {
  border-color: var(--border2);
  transform: translateY(-3px);
  box-shadow: 0 14px 40px rgba(0,0,0,.3);
}
.card-bar {
  height: 3px;
  background: linear-gradient(90deg, var(--blue), var(--purple));
  opacity: 0;
  transition: opacity .2s;
}
.recent-card:hover .card-bar { opacity: 1; }
.card-body { padding: 18px 18px 16px; flex: 1; display: flex; flex-direction: column; }
.new-pill {
  display: inline-block;
  background: rgba(59,130,246,.14); border: 1px solid rgba(59,130,246,.28);
  border-radius: 4px; padding: 2px 7px;
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  color: #93c5fd; letter-spacing: .07em; text-transform: uppercase;
  margin-bottom: 10px; align-self: flex-start;
}
.card-icon-wrap {
  width: 36px; height: 36px; border-radius: 9px;
  background: rgba(59,130,246,.10); border: 1px solid rgba(59,130,246,.18);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 12px; flex-shrink: 0;
}
.card-icon {
  width: 18px; height: 18px;
  stroke: var(--blue); stroke-width: 2; fill: none;
  stroke-linecap: round; stroke-linejoin: round;
}
.recent-title {
  font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700;
  color: var(--text); margin-bottom: 6px; letter-spacing: -.01em;
  line-height: 1.25;
}
.recent-desc { font-size: 12px; color: var(--dim); line-height: 1.45; flex: 1; }
.card-foot {
  margin-top: 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--muted); letter-spacing: .08em;
}

/* ═══════════════════════════════════════════════════════
   PEOPLE CARDS — professional directory
═══════════════════════════════════════════════════════ */
.people-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(175px,1fr));
  gap: 10px;
}
.person-card {
  display: block; text-decoration: none;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 11px; padding: 15px 16px;
  transition: border-color .18s, background .18s, transform .22s cubic-bezier(.16,1,.3,1);
  position: relative; overflow: hidden;
}
.person-card::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 2px; background: linear-gradient(90deg,var(--blue),var(--purple));
  opacity: 0; transition: opacity .2s;
}
.person-card:hover {
  background: var(--surface2); border-color: var(--border2);
  transform: translateY(-2px);
}
.person-card:hover::after { opacity: .7; }
.person-avatar {
  width: 34px; height: 34px; border-radius: 9px;
  background: rgba(59,130,246,.10); border: 1px solid rgba(59,130,246,.18);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 10px;
}
.person-avatar svg {
  width: 16px; height: 16px;
  stroke: var(--blue); stroke-width: 2; fill: none;
  stroke-linecap: round; stroke-linejoin: round;
}
.person-name {
  font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700;
  color: var(--text); margin-bottom: 3px; letter-spacing: -.01em;
}
.person-role { font-size: 11.5px; color: var(--dim); line-height: 1.35; margin-bottom: 10px; }
.person-status {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
  padding: 3px 9px; border-radius: 5px; border: 1px solid;
  letter-spacing: .04em;
}
.s-active   { background:rgba(52,211,105,.10);  border-color:rgba(52,211,105,.28);  color:#6ee7b7; }
.s-sent     { background:rgba(59,130,246,.10);  border-color:rgba(59,130,246,.28);  color:#93c5fd; }
.s-pipeline { background:rgba(245,158,11,.10);  border-color:rgba(245,158,11,.28);  color:#fcd34d; }
.s-soon     { background:rgba(139,92,246,.10);  border-color:rgba(139,92,246,.28);  color:#c4b5fd; }

/* ═══════════════════════════════════════════════════════
   TOOL CARDS — app-store quality tiles
═══════════════════════════════════════════════════════ */
.tool-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
  gap: 10px;
}
.tool-card {
  display: flex; align-items: flex-start; gap: 14px;
  text-decoration: none;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 18px;
  transition: border-color .18s, background .18s, transform .22s cubic-bezier(.16,1,.3,1), box-shadow .22s;
}
.tool-card:hover {
  background: var(--surface2); border-color: var(--border2);
  transform: translateY(-2px);
  box-shadow: 0 10px 32px rgba(0,0,0,.25);
}
.tool-icon-wrap {
  width: 40px; height: 40px; border-radius: 10px;
  background: rgba(20,184,166,.10); border: 1px solid rgba(20,184,166,.20);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.tool-icon-wrap svg {
  width: 18px; height: 18px;
  stroke: var(--teal); stroke-width: 2; fill: none;
  stroke-linecap: round; stroke-linejoin: round;
}
.tool-title {
  font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700;
  color: var(--text); margin-bottom: 4px; letter-spacing: -.01em;
}
.tool-desc { font-size: 12px; color: var(--dim); line-height: 1.4; }

/* ═══════════════════════════════════════════════════════
   LOADING / ERROR
═══════════════════════════════════════════════════════ */
.loading {
  text-align: center; padding: 64px 20px;
  color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 12px;
  letter-spacing: .06em;
}

/* ═══════════════════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════════════════ */
.site-footer {
  margin-top: 64px; padding: 24px 20px;
  border-top: 1px solid var(--border);
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--muted); letter-spacing: .15em;
  position: relative; z-index: 1;
}

/* MOBILE */
@media(max-width:500px) {
  .hero { padding: 48px 20px 40px; }
  .hero h1 { font-size: 34px; }
  .recent-grid { grid-template-columns: 1fr 1fr; }
  .people-grid { grid-template-columns: 1fr 1fr; }
  .tool-grid   { grid-template-columns: 1fr; }
}
@media(max-width:380px) {
  .recent-grid, .people-grid { grid-template-columns: 1fr; }
}

  </style>
</head>
<body>

</div>

<div class="site-footer">BRIAN WHITESEL · COLUMBUS OH · <span id="footer-year"></span></div>

<script>
(function () {

  // Set footer year
  document.getElementById('footer-year').textContent = new Date().getFullYear();

  // Status class helper
  function sc(s) {
    if (!s) return '';
    if (s === 'active') return 's-active';
    if (s === 'sent')   return 's-sent';
    if (s.includes('May') || s.includes('week') || s.includes('June')) return 's-soon';
    return 's-pipeline';
  }

  // SVG paths used in cards
  var SVG_DOC  = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke-linecap="round" stroke-linejoin="round"/><polyline points="14 2 14 8 20 8" stroke-linecap="round" stroke-linejoin="round"/><line x1="16" y1="13" x2="8" y2="13" stroke-linecap="round"/><line x1="16" y1="17" x2="8" y2="17" stroke-linecap="round"/><polyline points="10 9 9 9 8 9" stroke-linecap="round"/></svg>';
  var SVG_BOOK = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  var SVG_USER = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="7" r="4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  var SVG_TOOL = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  // Section wrapper
  function section(label, id, inner) {
    return '<div class="section" id="sec-' + id + '">'
      + '<div class="section-head">'
      + '<div class="section-label">' + label + '</div>'
      + '<div class="section-line"></div>'
      + '</div>'
      + inner
      + '</div>';
  }

  // Recent / knowledge editorial cards
  function recentCards(items, showNew) {
    return '<div class="recent-grid">'
      + items.map(function(item) {
          var icon = item.tag === 'knowledge' ? SVG_BOOK : SVG_DOC;
          return '<a href="' + item.href + '" class="recent-card">'
            + '<div class="card-bar"></div>'
            + '<div class="card-body">'
            + (showNew ? '<div class="new-pill">New</div>' : '')
            + '<div class="card-icon-wrap">' + icon + '</div>'
            + '<div class="recent-title">' + item.title + '</div>'
            + '<div class="recent-desc">' + item.desc + '</div>'
            + '<div class="card-foot">VIEW →</div>'
            + '</div>'
            + '</a>';
        }).join('')
      + '</div>';
  }

  // People directory cards
  function peopleCards(items) {
    return '<div class="people-grid">'
      + items.map(function(item) {
          var statusHtml = item.status
            ? '<div class="person-status ' + sc(item.status) + '">' + item.status + '</div>'
            : '';
          return '<a href="' + item.href + '" class="person-card">'
            + '<div class="person-avatar">' + SVG_USER + '</div>'
            + '<div class="person-name">' + item.name + '</div>'
            + '<div class="person-role">' + item.role + '</div>'
            + statusHtml
            + '</a>';
        }).join('')
      + '</div>';
  }

  // Tool app-store tiles
  function toolCards(items) {
    return '<div class="tool-grid">'
      + items.map(function(item) {
          return '<a href="' + item.href + '" class="tool-card">'
            + '<div class="tool-icon-wrap">' + SVG_TOOL + '</div>'
            + '<div>'
            + '<div class="tool-title">' + item.title + '</div>'
            + '<div class="tool-desc">' + item.desc + '</div>'
            + '</div>'
            + '</a>';
        }).join('')
      + '</div>';
  }

  // Fetch manifest and render
  fetch('./manifest.json?v=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var s = data.sections;
      var html = '';
      if (s.recent    && s.recent.length)    html += section('Recently Added',          'recent',    recentCards(s.recent, true));
      if (s.knowledge && s.knowledge.length) html += section('Knowledge Base',          'knowledge', recentCards(s.knowledge, false));
      if (s.clients   && s.clients.length)   html += section('Clients',                 'clients',   peopleCards(s.clients));
      if (s.prospects && s.prospects.length) html += section('Prospects & Outreach',    'prospects', peopleCards(s.prospects));
      if (s.friends   && s.friends.length)   html += section('Friends & Collaborators', 'friends',   peopleCards(s.friends));
      if (s.tools     && s.tools.length)     html += section('Shared Tools',            'tools',     toolCards(s.tools));
      document.getElementById('main-content').innerHTML = html;
      document.getElementById('updated-text').textContent = 'Updated ' + (data.updatedLabel || data.updated);
    })
    .catch(function() {
      document.getElementById('loading').innerHTML =
        'Push to GitHub Pages to load content, or open via a local web server.';
    });

})();

// — Particle dots —
(function(){
  var container = document.getElementById('bg-particles');
  if (!container) return;
  var colors = ['99,102,241','59,130,246','139,92,246','20,184,166','14,165,233','99,102,241','59,130,246'];
  var frag = document.createDocumentFragment();
  for (var i = 0; i < 65; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    var size  = (1.5 + Math.random() * 2.5).toFixed(1);
    var color = colors[Math.floor(Math.random() * colors.length)];
    var plo   = (0.10 + Math.random() * 0.12).toFixed(2);
    var phi   = (parseFloat(plo) + 0.10 + Math.random() * 0.10).toFixed(2);
    var x     = (Math.random() * 100).toFixed(1);
    var y     = (Math.random() * 100).toFixed(1);
    var dur   = (14 + Math.random() * 28).toFixed(1);
    var delay = (-Math.random() * 30).toFixed(1);
    var px1 = ((-20 + Math.random() * 40).toFixed(0)) + 'px';
    var py1 = ((-35 + Math.random() * 20).toFixed(0)) + 'px';
    var px2 = ((-15 + Math.random() * 30).toFixed(0)) + 'px';
    var py2 = ((-50 + Math.random() * 25).toFixed(0)) + 'px';
    var px3 = ((-10 + Math.random() * 25).toFixed(0)) + 'px';
    var py3 = ((-30 + Math.random() * 15).toFixed(0)) + 'px';
    p.style.cssText =
      'width:'+size+'px;height:'+size+'px;left:'+x+'%;top:'+y+'%;' +
      'background:rgba('+color+','+phi+');' +
      '--p-lo:'+plo+';--p-hi:'+phi+';' +
      '--px1:'+px1+';--py1:'+py1+';--px2:'+px2+';--py2:'+py2+';--px3:'+px3+';--py3:'+py3+';' +
      'animation:pFloat '+dur+'s '+delay+'s ease-in-out infinite;';
    frag.appendChild(p);
  }
  container.appendChild(frag);
})();
</script>
</body>
</html>
