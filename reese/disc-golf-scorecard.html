<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disc Golf Scorecard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d0f14;
            --surface: rgba(255,255,255,0.09);
            --surface2: rgba(255,255,255,0.14);
            --border: rgba(255,255,255,0.13);
            --border2: rgba(255,255,255,0.04);
            --text: #f1f5f9;
            --text2: #94a3b8;
            --text3: #475569;
            --accent: #818cf8;
            --accent-dim: rgba(129,140,248,0.1);
            --accent-border: rgba(129,140,248,0.25);
            --green: #4ade80;
            --green-dim: rgba(74,222,128,0.12);
            --green-border: rgba(74,222,128,0.3);
            --eagle: #34d399;
            --hio: #fbbf24;
            --red: #f87171;
            --red2: #fca5a5;
            /* Player accent colors */
            --p0: #818cf8; --p1: #4ade80; --p2: #fb923c; --p3: #e879f9;
        }
        html, body { width: 100%; }
        body {
            background: var(--bg);
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -5%, rgba(99,102,241,0.14) 0%, transparent 65%),
                radial-gradient(ellipse 50% 30% at 85% 85%, rgba(168,85,247,0.08) 0%, transparent 60%);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding-bottom: 100px;
            -webkit-font-smoothing: antialiased;
        }

        /* ── TOPBAR ── */
        .topbar {
            background: rgba(13,15,20,0.96);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            position: sticky; top: 0; z-index: 50;
            backdrop-filter: blur(14px);
        }
        .topbar-inner {
            max-width: 600px; margin: 0 auto;
            height: 52px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .topbar-left { display: flex; align-items: center; gap: 10px; }
        .topbar-icon {
            width: 32px; height: 32px; border-radius: 9px;
            background: var(--accent-dim); border: 1px solid var(--accent-border);
            display: flex; align-items: center; justify-content: center; color: var(--accent);
            flex-shrink: 0;
        }
        .topbar-name { font-family: 'Outfit', sans-serif; font-size: 0.95rem; font-weight: 800; color: #fff; }
        .topbar-course {
            font-size: 0.68rem; color: var(--text3); margin-top: 1px;
            cursor: pointer; display: flex; align-items: center; gap: 4px;
        }
        .topbar-right { display: flex; align-items: center; gap: 8px; }
        .topbar-btn {
            padding: 5px 10px; border-radius: 7px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text2); font-size: 0.72rem;
            font-family: 'Outfit', sans-serif; font-weight: 600; cursor: pointer;
        }

        /* ── STANDINGS STRIP ── */
        .standings-wrap {
            background: rgba(13,15,20,0.9); border-bottom: 1px solid var(--border2);
            padding: 0 16px; position: sticky; top: 52px; z-index: 49;
            backdrop-filter: blur(14px);
        }
        .standings-inner {
            max-width: 600px; margin: 0 auto;
            display: flex; gap: 6px; padding: 8px 0; overflow-x: auto;
            -webkit-overflow-scrolling: touch; scrollbar-width: none;
        }
        .standings-inner::-webkit-scrollbar { display: none; }
        .player-chip {
            display: flex; align-items: center; gap: 6px;
            padding: 5px 10px; border-radius: 20px;
            border: 1px solid var(--border); background: var(--surface);
            white-space: nowrap; flex-shrink: 0; transition: all 0.2s;
        }
        .player-chip.leading {
            border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.06);
        }
        .player-chip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .player-chip-name { font-size: 0.72rem; font-weight: 600; color: var(--text2); }
        .player-chip-score {
            font-family: 'Outfit', sans-serif; font-size: 0.8rem; font-weight: 800;
        }
        .chip-under { color: var(--green); }
        .chip-over  { color: var(--red2); }
        .chip-even  { color: var(--text3); }
        .chip-lead-icon { font-size: 0.65rem; }

        /* ── CONTENT ── */
        .content { max-width: 600px; margin: 0 auto; padding: 14px 14px 0; }

        /* ── HOLES GRID ── */
        .holes-label {
            font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
            text-transform: uppercase; letter-spacing: 0.12em; color: var(--text3); margin-bottom: 8px;
        }
        .holes-grid {
            display: grid; grid-template-columns: repeat(6, 1fr);
            gap: 5px; margin-bottom: 16px;
        }
        .hole-cell {
            background: var(--surface); border: 1.5px solid var(--border);
            border-radius: 11px; padding: 8px 4px 6px;
            text-align: center; cursor: pointer;
            transition: background 0.15s, border-color 0.15s, transform 0.12s;
            -webkit-tap-highlight-color: transparent;
        }
        .hole-cell:active { transform: scale(0.95); }
        .hole-num { font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; color: var(--text3); margin-bottom: 3px; }
        .hole-par-label { font-size: 0.6rem; color: var(--text3); margin-bottom: 5px; }
        .hole-dots { display: flex; gap: 2px; justify-content: center; flex-wrap: wrap; min-height: 10px; }
        .hdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .hdot-unscored { background: rgba(255,255,255,0.1); }
        .hdot-hio    { background: var(--hio); box-shadow: 0 0 4px rgba(251,191,36,0.6); }
        .hdot-eagle  { background: var(--eagle); }
        .hdot-birdie { background: var(--green); }
        .hdot-par    { background: rgba(255,255,255,0.25); }
        .hdot-bogey  { background: var(--red2); }
        .hdot-double { background: var(--red); }

        /* hole has any birdie/eagle/HIO */
        .hole-cell.has-good { border-color: rgba(74,222,128,0.25); }
        .hole-cell.has-great { border-color: rgba(52,211,153,0.35); }
        .hole-cell.all-par { border-color: var(--border); }

        /* ── SCORECARD TABLE ── */
        .table-wrap {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; overflow: hidden; margin-bottom: 14px;
        }
        .table-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 11px 14px; border-bottom: 1px solid var(--border2);
        }
        .table-title { font-family: 'Outfit', sans-serif; font-size: 0.8rem; font-weight: 700; color: #fff; }
        .table-toggle {
            font-size: 0.72rem; color: var(--accent);
            background: none; border: none; cursor: pointer; font-family: 'Inter', sans-serif;
        }
        .scorecard-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .scorecard-table {
            width: 100%; border-collapse: collapse; font-size: 0.75rem; min-width: 500px;
        }
        .scorecard-table th {
            background: rgba(255,255,255,0.03); padding: 5px 6px; text-align: center;
            font-family: 'JetBrains Mono', monospace; font-size: 0.58rem; font-weight: 500;
            color: var(--text3); letter-spacing: 0.06em; border-bottom: 1px solid var(--border2);
        }
        .scorecard-table td {
            padding: 6px 6px; text-align: center; border-bottom: 1px solid var(--border2);
            font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--text2);
        }
        .scorecard-table tr:last-child td { border-bottom: none; }
        .td-player { font-size: 0.65rem; font-weight: 700; color: #fff; text-align: left; padding-left: 10px; white-space: nowrap; min-width: 60px; }
        .td-total { font-weight: 700; color: #fff; background: rgba(255,255,255,0.03); }
        .sc-hio    { color: var(--hio); font-weight: 700; }
        .sc-eagle  { color: var(--eagle); font-weight: 700; }
        .sc-bird   { color: var(--green); font-weight: 700; }
        .sc-bog    { color: var(--red2); }
        .sc-dbl    { color: var(--red); }

        /* ── ACTIONS ── */
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
        .action-btn {
            padding: 11px; border-radius: 10px; font-family: 'Outfit', sans-serif;
            font-size: 0.82rem; font-weight: 700; cursor: pointer; border: none;
            transition: opacity 0.15s, transform 0.12s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .action-btn:active { transform: scale(0.97); }
        .btn-save { background: var(--accent-dim); border: 1px solid var(--accent-border); color: var(--accent); }
        .btn-new  { background: var(--surface); border: 1px solid var(--border); color: var(--text2); }

        /* ── HISTORY ── */
        .history-label {
            font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
            text-transform: uppercase; letter-spacing: 0.12em; color: var(--text3); margin-bottom: 8px;
        }
        .history-item {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 11px 14px; margin-bottom: 6px;
        }
        .hist-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
        .hist-course { font-size: 0.82rem; font-weight: 600; color: var(--text); }
        .hist-meta { font-size: 0.7rem; color: var(--text3); }
        .hist-delete { background: none; border: none; color: var(--text3); cursor: pointer; padding: 2px 6px; font-size: 1rem; }
        .hist-players { display: flex; gap: 8px; flex-wrap: wrap; }
        .hist-player {
            display: flex; align-items: center; gap: 5px;
            font-size: 0.72rem; color: var(--text2);
        }
        .hist-player-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .hist-player-score { font-family: 'Outfit', sans-serif; font-size: 0.78rem; font-weight: 800; }
        .hist-trophy { font-size: 0.75rem; }
        .no-history {
            font-size: 0.82rem; color: var(--text3); text-align: center;
            padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
        }

        /* ── SETUP MODAL ── */
        .overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.8); z-index: 200;
            align-items: flex-end; justify-content: center;
            backdrop-filter: blur(8px);
        }
        .overlay.active { display: flex; }
        .sheet {
            background: #131720; border: 1px solid var(--border);
            border-radius: 22px 22px 0 0; padding: 20px 20px 48px;
            width: 100%; max-width: 480px;
            animation: slideUp 0.25s cubic-bezier(0.16,1,0.3,1);
            max-height: 90vh; overflow-y: auto;
        }
        @keyframes slideUp {
            from { transform: translateY(32px); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }
        .sheet-handle {
            width: 36px; height: 4px; background: rgba(255,255,255,0.1);
            border-radius: 10px; margin: 0 auto 20px;
        }
        .sheet-title {
            font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 800;
            color: #fff; margin-bottom: 4px;
        }
        .sheet-sub { font-size: 0.82rem; color: var(--text3); margin-bottom: 20px; }

        /* player count picker */
        .count-row { display: flex; gap: 8px; margin-bottom: 18px; }
        .count-btn {
            flex: 1; padding: 10px 4px; border-radius: 10px;
            border: 1px solid var(--border); background: var(--surface);
            color: var(--text2); font-family: 'Outfit', sans-serif;
            font-size: 0.85rem; font-weight: 700; cursor: pointer; text-align: center;
            transition: all 0.15s;
        }
        .count-btn.active {
            border-color: var(--accent-border); background: var(--accent-dim); color: var(--accent);
        }

        /* player name inputs */
        .player-inputs { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
        .player-input-row { display: flex; align-items: center; gap: 10px; }
        .player-color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .player-name-input {
            flex: 1; background: var(--surface2); border: 1px solid var(--border);
            border-radius: 9px; padding: 9px 12px; color: var(--text);
            font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none;
            -webkit-appearance: none; color-scheme: dark;
        }
        .player-name-input:focus { border-color: var(--accent); }

        /* course input */
        .setup-course-input {
            width: 100%; background: var(--surface2); border: 1px solid var(--border);
            border-radius: 9px; padding: 9px 12px; color: var(--text);
            font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none;
            margin-bottom: 18px; -webkit-appearance: none; color-scheme: dark;
        }
        .setup-course-input:focus { border-color: var(--accent); }

        .setup-start-btn {
            width: 100%; padding: 13px; border-radius: 11px;
            background: var(--accent-dim); border: 1px solid var(--accent-border);
            color: var(--accent); font-family: 'Outfit', sans-serif;
            font-size: 1rem; font-weight: 800; cursor: pointer;
        }

        /* ── HOLE MODAL ── */
        .hole-modal-title {
            text-align: center; margin-bottom: 14px;
        }
        .hole-modal-num {
            font-family: 'Outfit', sans-serif; font-size: 1.4rem; font-weight: 800; color: #fff;
        }
        .hole-modal-par { font-size: 0.78rem; color: var(--text2); margin-top: 2px; }

        .par-btns { display: flex; gap: 6px; margin-bottom: 16px; }
        .par-btn {
            flex: 1; padding: 8px 0; border-radius: 9px;
            border: 1px solid var(--border); background: var(--surface);
            color: var(--text2); font-family: 'Outfit', sans-serif;
            font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: all 0.15s; text-align: center;
        }
        .par-btn.active { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }

        .player-score-rows { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
        .player-score-row {
            display: flex; align-items: center; gap: 10px;
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            padding: 10px 12px;
        }
        .psr-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .psr-name {
            font-size: 0.75rem; font-weight: 600; color: var(--text2);
            width: 60px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .psr-adj {
            width: 34px; height: 34px; border-radius: 50%;
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--text); font-size: 1.2rem; font-weight: 300;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: background 0.12s; flex-shrink: 0;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }
        .psr-adj:active { background: rgba(255,255,255,0.12); transform: scale(0.93); }
        .psr-score-wrap { flex: 1; text-align: center; }
        .psr-score {
            font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 800;
            color: #fff; line-height: 1;
        }
        .psr-score.empty { color: var(--text3); font-size: 1.1rem; }
        .psr-label {
            font-size: 0.62rem; font-weight: 600; margin-top: 2px;
            height: 14px; display: flex; align-items: center; justify-content: center;
        }
        .lbl-hio    { color: var(--hio); }
        .lbl-eagle  { color: var(--eagle); }
        .lbl-birdie { color: var(--green); }
        .lbl-par    { color: var(--text3); }
        .lbl-bogey  { color: var(--red2); }
        .lbl-dbl    { color: var(--red); }

        .hole-modal-actions { display: flex; gap: 8px; }
        .hm-clear {
            padding: 12px 16px; border-radius: 10px;
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text3); font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 700; cursor: pointer;
        }
        .hm-confirm {
            flex: 1; padding: 12px; border-radius: 10px;
            background: var(--green-dim); border: 1px solid var(--green-border);
            color: var(--green); font-family: 'Outfit', sans-serif; font-size: 0.92rem; font-weight: 800; cursor: pointer;
        }

        /* ── COURSE MODAL (simple center modal) ── */
        .center-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.75); z-index: 200;
            align-items: center; justify-content: center; padding: 20px;
            backdrop-filter: blur(6px);
        }
        .center-overlay.active { display: flex; }
        .center-modal {
            background: #131720; border: 1px solid var(--border);
            border-radius: 16px; padding: 22px 20px; width: 100%; max-width: 360px;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
        .center-modal h3 {
            font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 800; color: #fff; margin-bottom: 12px;
        }
        .center-input {
            width: 100%; background: var(--surface2); border: 1px solid var(--border);
            border-radius: 9px; padding: 9px 12px; color: var(--text);
            font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none;
            margin-bottom: 12px; -webkit-appearance: none; color-scheme: dark;
        }
        .center-input:focus { border-color: var(--accent); }
        .center-confirm {
            width: 100%; padding: 10px; border-radius: 9px;
            background: var(--accent-dim); border: 1px solid var(--accent-border);
            color: var(--accent); font-family: 'Outfit', sans-serif; font-size: 0.88rem; font-weight: 700; cursor: pointer;
        }

        /* ── LEADERBOARD END-ROUND ── */
        .leaderboard-wrap {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 16px; margin-bottom: 14px; display: none;
        }
        .leaderboard-wrap.visible { display: block; }
        .lb-title {
            font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 700;
            color: #fff; margin-bottom: 12px; text-align: center;
        }
        .lb-row {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 10px; border-radius: 10px; margin-bottom: 6px;
            background: rgba(255,255,255,0.02); border: 1px solid var(--border2);
        }
        .lb-row.lb-winner {
            background: rgba(251,191,36,0.07); border-color: rgba(251,191,36,0.25);
        }
        .lb-rank { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text3); width: 20px; flex-shrink: 0; }
        .lb-rank.gold { color: var(--hio); }
        .lb-rank.silver { color: #94a3b8; }
        .lb-rank.bronze { color: #cd7c4e; }
        .lb-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
        .lb-name { font-size: 0.85rem; font-weight: 600; color: var(--text); flex: 1; }
        .lb-score { font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 800; }
        .lb-thru { font-size: 0.68rem; color: var(--text3); }

        /* ── CONFETTI ── */
        .confetti-piece {
            position: fixed; pointer-events: none; z-index: 300;
            animation: fall var(--dur, 1.2s) ease-in var(--delay, 0s) forwards;
        }
        @keyframes fall {
            0%   { transform: translateY(-10px) rotate(0deg) scale(1); opacity: 1; }
            80%  { opacity: 1; }
            100% { transform: translateY(100vh) rotate(var(--rot, 720deg)) scale(0.6); opacity: 0; }
        }

        .setup-label { font-size: 0.7rem; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }

        /* ── SETUP AVATARS ── */
        .setup-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            border: 2px solid; flex-shrink: 0; cursor: pointer;
            position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.04);
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.12s;
        }
        .setup-avatar:active { transform: scale(0.9); }
        .setup-avatar img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .setup-avatar-cam {
            position: absolute; bottom: 0; left: 0; right: 0;
            text-align: center; font-size: 0.45rem; background: rgba(0,0,0,0.5);
            padding: 2px 0; line-height: 1.2; pointer-events: none;
        }

        /* ── COUNT STEPPER ── */
        .count-stepper {
            display: flex; align-items: center;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; overflow: hidden; margin-bottom: 18px; height: 44px;
        }
        .count-step-btn {
            width: 44px; height: 44px; background: none; border: none;
            color: var(--text2); font-size: 1.4rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: background 0.12s; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .count-step-btn:active { background: rgba(255,255,255,0.08); }
        .count-step-btn:disabled { color: var(--text3); cursor: default; }
        .count-step-display {
            flex: 1; text-align: center; font-family: 'Outfit', sans-serif;
            font-size: 0.95rem; font-weight: 700; color: #fff;
        }

        /* ── WINNER MODAL ── */
        .winner-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.88); z-index: 400;
            align-items: center; justify-content: center; padding: 20px;
            backdrop-filter: blur(16px);
        }
        .winner-overlay.active { display: flex; }
        .winner-sheet {
            background: #131720; border: 1px solid rgba(251,191,36,0.22);
            border-radius: 22px; padding: 28px 22px;
            width: 100%; max-width: 400px;
            animation: fadeIn 0.3s cubic-bezier(0.16,1,0.3,1);
            text-align: center; max-height: 90vh; overflow-y: auto;
        }
        .winner-badge {
            display: inline-block; padding: 4px 13px; border-radius: 20px;
            background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.25);
            font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
            text-transform: uppercase; letter-spacing: 0.12em; color: var(--hio);
            margin-bottom: 16px;
        }
        .winner-crown { font-size: 2.6rem; line-height: 1; margin-bottom: 8px; }
        .winner-name {
            font-family: 'Outfit', sans-serif; font-size: 1.6rem; font-weight: 800;
            color: #fff; margin-bottom: 4px;
        }
        .winner-score-line {
            font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 800;
            margin-bottom: 20px;
        }
        .winner-divider { height: 1px; background: var(--border); margin: 0 0 16px; }
        .winner-lb { margin-bottom: 20px; text-align: left; }
        .winner-lb-row {
            display: flex; align-items: center; gap: 9px;
            padding: 8px 10px; border-radius: 10px; margin-bottom: 5px;
            background: rgba(255,255,255,0.02); border: 1px solid var(--border2);
        }
        .winner-lb-row.w-top { background: rgba(251,191,36,0.07); border-color: rgba(251,191,36,0.2); }
        .winner-lb-rank { font-size: 0.85rem; width: 26px; flex-shrink: 0; }
        .winner-lb-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .winner-lb-name { font-size: 0.85rem; font-weight: 600; color: var(--text); flex: 1; }
        .winner-lb-score { font-family: 'Outfit', sans-serif; font-size: 0.95rem; font-weight: 800; }
        .winner-lb-thru { font-size: 0.68rem; color: var(--text3); min-width: 48px; text-align: right; }
        .winner-actions { display: flex; gap: 8px; flex-direction: column; }
        .winner-actions-row { display: flex; gap: 8px; }
        .winner-post-btn { width: 100%; padding: 12px; border-radius: 11px; background: rgba(129,140,248,0.1); border: 1px solid rgba(129,140,248,0.3); color: #818cf8; font-family: 'Outfit', sans-serif; font-size: 0.88rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .winner-post-btn:disabled { opacity: 0.6; cursor: default; }
        .winner-save-btn {
            flex: 1; padding: 13px; border-radius: 11px;
            background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3);
            color: var(--hio); font-family: 'Outfit', sans-serif;
            font-size: 0.92rem; font-weight: 800; cursor: pointer;
        }
        .winner-edit-btn {
            padding: 13px 16px; border-radius: 11px;
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text2); font-family: 'Outfit', sans-serif;
            font-size: 0.85rem; font-weight: 600; cursor: pointer;
        }

        @media (max-width: 400px) {
            .holes-grid { gap: 3px; }
        }
    </style>
</head>
<body>

<!-- ── TOPBAR ── -->
<div class="topbar">
    <div class="topbar-inner">
        <div class="topbar-left">
            <div class="topbar-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
            </div>
            <div>
                <div class="topbar-name">Scorecard</div>
                <div class="topbar-course" id="courseLabel" onclick="openCourseModal()">
                    Home Course
                    <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </div>
            </div>
        </div>
        <div class="topbar-right">
            <button class="topbar-btn" onclick="openSetupModal(true)">+ Players</button>
        </div>
    </div>
</div>

<!-- ── STANDINGS STRIP ── -->
<div class="standings-wrap">
    <div class="standings-inner" id="standingsStrip"></div>
</div>

<!-- ── CONTENT ── -->
<div class="content">

    <div class="holes-label">Holes — Tap to Score</div>
    <div class="holes-grid" id="holesGrid"></div>

    <!-- Leaderboard (shown when round complete or partial) -->
    <div class="leaderboard-wrap" id="leaderboardWrap">
        <div class="lb-title">🏆 Leaderboard</div>
        <div id="leaderboardList"></div>
    </div>

    <!-- Scorecard table -->
    <div class="table-wrap">
        <div class="table-header">
            <div class="table-title">Full Scorecard</div>
            <button class="table-toggle" id="tableToggleBtn" onclick="toggleTable()">Hide</button>
        </div>
        <div id="tableBody">
            <div class="scorecard-scroll">
                <table class="scorecard-table" id="scorecardTable"></table>
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="actions">
        <button class="action-btn btn-save" onclick="saveRound()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Save Round
        </button>
        <button class="action-btn btn-new" onclick="confirmNewRound()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-8.49L23 10"/></svg>
            New Round
        </button>
    </div>

    <!-- History -->
    <div class="history-label">Round History</div>
    <div id="historyList"></div>

</div>

<!-- ── SETUP MODAL ── -->
<div class="overlay" id="setupOverlay">
    <div class="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title" id="setupTitle">New Round</div>
        <div class="sheet-sub">Who's playing? Set names, then tee off.</div>

        <div class="setup-label">Course</div>
        <input class="setup-course-input" id="setupCourse" type="text" placeholder="Home Course, Alum Creek, Glacier Ridge..." maxlength="40">

        <div class="setup-label">Players</div>
        <div class="count-stepper" id="countRow">
            <button class="count-step-btn" id="countDecBtn" onclick="setPlayerCount(setupPlayerCount - 1)">−</button>
            <div class="count-step-display" id="countDisplay">2 Players</div>
            <button class="count-step-btn" id="countIncBtn" onclick="setPlayerCount(setupPlayerCount + 1)">+</button>
        </div>
        <div class="player-inputs" id="playerInputs"></div>
        <button class="setup-start-btn" onclick="startRound()">Start Round →</button>
    </div>
</div>

<!-- ── HOLE MODAL ── -->
<div class="overlay" id="holeOverlay" onclick="handleHoleOverlayClick(event)">
    <div class="sheet" id="holeSheet">
        <div class="sheet-handle"></div>
        <div class="hole-modal-title">
            <div class="hole-modal-num" id="modalHoleNum">Hole 1</div>
            <div class="hole-modal-par" id="modalHolePar">Par 3</div>
        </div>
        <div class="par-btns">
            <button class="par-btn" onclick="setModalPar(3)" id="parBtn3">Par 3</button>
            <button class="par-btn" onclick="setModalPar(4)" id="parBtn4">Par 4</button>
            <button class="par-btn" onclick="setModalPar(5)" id="parBtn5">Par 5</button>
        </div>
        <div class="player-score-rows" id="playerScoreRows"></div>
        <div class="hole-modal-actions">
            <button class="hm-clear" onclick="clearAllScores()">Clear All</button>
            <button class="hm-confirm" onclick="confirmHole()">Save Hole ✓</button>
        </div>
    </div>
</div>

<!-- ── WINNER MODAL ── -->
<div class="winner-overlay" id="winnerOverlay">
    <div class="winner-sheet">
        <div class="winner-badge">Round Complete</div>
        <div id="wWinnerAvatar" style="margin-bottom:8px;"></div>
        <div class="winner-name" id="wWinnerName"></div>
        <div class="winner-score-line" id="wWinnerScore"></div>
        <div class="winner-divider"></div>
        <div class="winner-lb" id="wLeaderboard"></div>
        <div class="winner-actions">
            <button class="winner-post-btn" id="postFeedBtn" onclick="postToFeed()">📢 Post to Feed + Save</button>
            <div class="winner-actions-row">
                <button class="winner-save-btn" onclick="commitSave()">Save Only ✓</button>
                <button class="winner-edit-btn" onclick="closeWinner()">Keep Editing</button>
            </div>
        </div>
    </div>
</div>

<!-- ── COURSE MODAL ── -->
<div class="center-overlay" id="courseOverlay" onclick="handleCourseOverlayClick(event)">
    <div class="center-modal">
        <h3>Course Name</h3>
        <input class="center-input" id="courseInput" type="text" placeholder="e.g. Alum Creek, Glacier Ridge..." maxlength="40">
        <button class="center-confirm" onclick="saveCourse()">Update</button>
    </div>
</div>

<script>
    /* ═══════════════════════════════════════════
       STORAGE
    ═══════════════════════════════════════════ */
    const ROUND_KEY   = 'reese_dg_mp_round_v1';
    const HISTORY_KEY = 'reese_dg_mp_history_v1';
    const LEGACY_KEY  = 'reese_dg_history_v1'; // old single-player history

    /* ═══════════════════════════════════════════
       PLAYER COLORS
    ═══════════════════════════════════════════ */
    const PLAYER_COLORS = [
        '#818cf8', // indigo
        '#4ade80', // green
        '#fb923c', // orange
        '#e879f9', // pink
        '#38bdf8', // sky
        '#fbbf24', // amber
        '#f87171', // red
        '#2dd4bf', // teal
        '#a3e635', // lime
        '#c084fc'  // purple
    ];

    /* ═══════════════════════════════════════════
       STATE
    ═══════════════════════════════════════════ */
    let round = null;
    let history = [];
    let activeHoleIdx = null;
    let modalPar = 3;
    let modalScores = []; // temp scores in hole modal, per player
    let tableVisible = true;

    function defaultRound(players, course) {
        return {
            course: course || 'Home Course',
            players: players || ['Player 1', 'Player 2'],
            holes: Array.from({ length: 18 }, (_, i) => ({
                num: i + 1, par: 3,
                scores: (players || ['Player 1', 'Player 2']).map(() => null)
            }))
        };
    }

    function loadState() {
        try {
            const saved = JSON.parse(localStorage.getItem(ROUND_KEY));
            if (saved && saved.players && saved.holes) { round = saved; return true; }
        } catch {}
        return false;
    }

    function saveState() {
        localStorage.setItem(ROUND_KEY, JSON.stringify(round));
    }

    function loadHistory() {
        try { history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; } catch { history = []; }
    }

    function saveHistory() {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    /* ═══════════════════════════════════════════
       SCORE HELPERS
    ═══════════════════════════════════════════ */
    function scoreClass(score, par) {
        if (score === null) return 'unscored';
        if (score === 1) return 'hio';
        const rel = score - par;
        if (rel <= -2) return 'eagle';
        if (rel === -1) return 'birdie';
        if (rel === 0)  return 'par';
        if (rel === 1)  return 'bogey';
        return 'double';
    }

    function scoreLabelText(score, par) {
        if (score === null) return '';
        if (score === 1) return 'Hole In One 🎉';
        const rel = score - par;
        if (rel <= -2) return rel === -2 ? 'Eagle' : 'Albatross';
        if (rel === -1) return 'Birdie';
        if (rel === 0)  return 'Par';
        if (rel === 1)  return 'Bogey';
        if (rel === 2)  return 'Double Bogey';
        return '+' + rel;
    }

    function relStr(rel) {
        if (rel === 0) return 'E';
        return rel > 0 ? '+' + rel : '' + rel;
    }

    function playerTotals(pIdx) {
        let strokes = 0, relTotal = 0, thru = 0;
        round.holes.forEach(h => {
            const sc = h.scores[pIdx];
            if (sc !== null) { strokes += sc; relTotal += sc - h.par; thru++; }
        });
        return { strokes, rel: relTotal, thru };
    }

    /* ═══════════════════════════════════════════
       RENDER
    ═══════════════════════════════════════════ */
    function render() {
        if (!round) return;
        renderCourseLabel();
        renderStandings();
        renderGrid();
        renderLeaderboard();
        renderTable();
        renderHistory();
    }

    function renderCourseLabel() {
        const el = document.getElementById('courseLabel');
        el.childNodes[0].textContent = round.course + ' ';
    }

    function renderStandings() {
        const strip = document.getElementById('standingsStrip');
        if (!round) { strip.innerHTML = ''; return; }
        // Find leader (lowest rel score among those who've played)
        const totals = round.players.map((_, i) => playerTotals(i));
        const played = totals.filter(t => t.thru > 0);
        const minRel = played.length ? Math.min(...played.map(t => t.rel)) : null;

        strip.innerHTML = round.players.map((name, i) => {
            const t = totals[i];
            const isLeading = t.thru > 0 && t.rel === minRel;
            const sClass = t.thru === 0 ? 'chip-even' : t.rel < 0 ? 'chip-under' : t.rel > 0 ? 'chip-over' : 'chip-even';
            const scoreDisp = t.thru === 0 ? '—' : relStr(t.rel);
            return `<div class="player-chip ${isLeading ? 'leading' : ''}">
                ${avatarHtml(name, PLAYER_COLORS[i], 22)}
                <span class="player-chip-name">${name}</span>
                <span class="player-chip-score ${sClass}">${scoreDisp}</span>
                ${isLeading && played.length > 1 ? '<span class="chip-lead-icon">🏆</span>' : ''}
            </div>`;
        }).join('');
    }

    function renderGrid() {
        const grid = document.getElementById('holesGrid');
        grid.innerHTML = '';
        round.holes.forEach((h, i) => {
            const div = document.createElement('div');
            // Determine cell class based on best score
            const scoredClasses = h.scores.filter(s => s !== null).map(s => scoreClass(s, h.par));
            let cellClass = '';
            if (scoredClasses.includes('hio') || scoredClasses.includes('eagle')) cellClass = 'has-great';
            else if (scoredClasses.includes('birdie')) cellClass = 'has-good';
            else if (scoredClasses.length > 0 && scoredClasses.every(c => c === 'par')) cellClass = 'all-par';

            div.className = 'hole-cell ' + cellClass;
            div.onclick = () => openHoleModal(i);

            const dots = round.players.map((_, pi) => {
                const sc = h.scores[pi];
                const dotClass = 'hdot hdot-' + scoreClass(sc, h.par);
                return `<div class="${dotClass}" style="${sc !== null ? '' : 'background:rgba(255,255,255,0.08)'}"></div>`;
            }).join('');

            div.innerHTML = `
                <div class="hole-num">${h.num}</div>
                <div class="hole-par-label" style="font-size:0.55rem;color:var(--text3);">p${h.par}</div>
                <div class="hole-dots">${dots}</div>`;
            grid.appendChild(div);
        });
    }

    function renderLeaderboard() {
        const wrap = document.getElementById('leaderboardWrap');
        const list = document.getElementById('leaderboardList');
        const totalHoles = round.holes.filter(h => h.scores.some(s => s !== null)).length;
        if (totalHoles === 0) { wrap.classList.remove('visible'); return; }

        const ranked = round.players.map((name, i) => {
            const t = playerTotals(i);
            return { name, i, ...t };
        }).sort((a, b) => {
            if (a.thru === 0 && b.thru === 0) return 0;
            if (a.thru === 0) return 1;
            if (b.thru === 0) return -1;
            return a.rel - b.rel;
        });

        const rankLabels = ['🥇', '🥈', '🥉', '4'];
        const rankClasses = ['gold', 'silver', 'bronze', ''];

        list.innerHTML = ranked.map((p, ri) => {
            const t = p.thru > 0 ? relStr(p.rel) : '—';
            const tClass = p.thru === 0 ? 'chip-even' : p.rel < 0 ? 'chip-under' : p.rel > 0 ? 'chip-over' : 'chip-even';
            const isWinner = ri === 0 && p.thru > 0 && round.players.length > 1;
            return `<div class="lb-row ${isWinner ? 'lb-winner' : ''}">
                <div class="lb-rank ${rankClasses[ri]}">${rankLabels[ri]}</div>
                ${avatarHtml(p.name, PLAYER_COLORS[p.i], 28)}
                <div class="lb-name">${p.name}</div>
                <div class="lb-score ${tClass}" style="color:${p.thru===0?'var(--text3)':p.rel<0?'var(--green)':p.rel>0?'var(--red2)':'var(--text2)'}">${t}</div>
                <div class="lb-thru">${p.thru > 0 ? p.strokes + ' · ' + p.thru + ' holes' : '—'}</div>
            </div>`;
        }).join('');

        wrap.classList.add('visible');
    }

    function renderTable() {
        const t = document.getElementById('scorecardTable');
        if (!tableVisible) { t.innerHTML = ''; return; }
        const front = round.holes.slice(0, 9);
        const back  = round.holes.slice(9, 18);

        let html = '<thead><tr><th>Hole</th>';
        for (let i = 1; i <= 9;  i++) html += '<th>' + i + '</th>';
        html += '<th>OUT</th>';
        for (let i = 10; i <= 18; i++) html += '<th>' + i + '</th>';
        html += '<th>IN</th><th>TOT</th></tr></thead><tbody>';

        // Par row
        let fPar = 0, bPar = 0;
        html += '<tr><td style="color:var(--text3);font-size:0.65rem;">Par</td>';
        front.forEach(h => { html += '<td>' + h.par + '</td>'; fPar += h.par; });
        html += '<td class="td-total">' + fPar + '</td>';
        back.forEach(h => { html += '<td>' + h.par + '</td>'; bPar += h.par; });
        html += '<td class="td-total">' + bPar + '</td><td class="td-total">' + (fPar + bPar) + '</td></tr>';

        // Player rows
        round.players.forEach((name, pi) => {
            const color = PLAYER_COLORS[pi];
            html += `<tr><td class="td-player" style="border-left:2px solid ${color};">${name}</td>`;
            let fScore = 0, bScore = 0, fPlayed = 0, bPlayed = 0;
            front.forEach(h => {
                const sc = h.scores[pi];
                const cls = sc !== null ? cellScoreClass(sc, h.par) : '';
                html += '<td class="' + cls + '">' + (sc !== null ? sc : '—') + '</td>';
                if (sc !== null) { fScore += sc; fPlayed++; }
            });
            html += '<td class="td-total">' + (fPlayed > 0 ? fScore : '—') + '</td>';
            back.forEach(h => {
                const sc = h.scores[pi];
                const cls = sc !== null ? cellScoreClass(sc, h.par) : '';
                html += '<td class="' + cls + '">' + (sc !== null ? sc : '—') + '</td>';
                if (sc !== null) { bScore += sc; bPlayed++; }
            });
            html += '<td class="td-total">' + (bPlayed > 0 ? bScore : '—') + '</td>';
            html += '<td class="td-total">' + ((fPlayed + bPlayed) > 0 ? fScore + bScore : '—') + '</td></tr>';

            // +/- row for this player
            const t = playerTotals(pi);
            html += `<tr><td style="color:${color};font-size:0.58rem;padding-left:12px;border-left:2px solid ${color};">+/-</td>`;
            let fRel = 0, bRel = 0, fPl = 0, bPl = 0;
            front.forEach(h => {
                const sc = h.scores[pi];
                if (sc === null) { html += '<td style="color:var(--text3)">—</td>'; return; }
                const rel = sc - h.par;
                fRel += rel; fPl++;
                const c = rel < 0 ? 'color:var(--green)' : rel > 0 ? 'color:var(--red2)' : 'color:var(--text3)';
                html += `<td style="${c}">${relStr(rel)}</td>`;
            });
            const frStr = fPl > 0 ? relStr(fRel) : '—';
            const frC = fPl > 0 && fRel < 0 ? 'color:var(--green)' : fPl > 0 && fRel > 0 ? 'color:var(--red2)' : '';
            html += `<td class="td-total" style="${frC}">${frStr}</td>`;
            back.forEach(h => {
                const sc = h.scores[pi];
                if (sc === null) { html += '<td style="color:var(--text3)">—</td>'; return; }
                const rel = sc - h.par;
                bRel += rel; bPl++;
                const c = rel < 0 ? 'color:var(--green)' : rel > 0 ? 'color:var(--red2)' : 'color:var(--text3)';
                html += `<td style="${c}">${relStr(rel)}</td>`;
            });
            const brStr = bPl > 0 ? relStr(bRel) : '—';
            const brC = bPl > 0 && bRel < 0 ? 'color:var(--green)' : bPl > 0 && bRel > 0 ? 'color:var(--red2)' : '';
            const totRel = fRel + bRel;
            const trStr = (fPl + bPl) > 0 ? relStr(totRel) : '—';
            const trC = (fPl+bPl)>0&&totRel<0?'color:var(--green)':(fPl+bPl)>0&&totRel>0?'color:var(--red2)':'';
            html += `<td class="td-total" style="${brC}">${brStr}</td><td class="td-total" style="${trC}">${trStr}</td></tr>`;
        });

        html += '</tbody>';
        t.innerHTML = html;
    }

    function cellScoreClass(sc, par) {
        const cls = scoreClass(sc, par);
        const map = { hio:'sc-hio', eagle:'sc-eagle', birdie:'sc-bird', bogey:'sc-bog', double:'sc-dbl' };
        return map[cls] || '';
    }

    function renderHistory() {
        const el = document.getElementById('historyList');
        let items = [...history].reverse();

        // Also show legacy single-player rounds
        let legacy = [];
        try { legacy = JSON.parse(localStorage.getItem(LEGACY_KEY)) || []; } catch {}

        if (items.length === 0 && legacy.length === 0) {
            el.innerHTML = '<div class="no-history">No saved rounds yet. Finish a round and hit Save.</div>';
            return;
        }

        const newHtml = items.map((r, ri) => {
            const actualIdx = history.length - 1 - ri;
            const ranked = r.playerResults.slice().sort((a, b) => a.rel - b.rel);
            const playerHtml = ranked.map((p, ri2) => {
                const medal = ri2 === 0 && ranked.length > 1 ? '🥇 ' : '';
                const tClass = p.rel < 0 ? 'chip-under' : p.rel > 0 ? 'chip-over' : 'chip-even';
                return `<div class="hist-player">
                    <div class="hist-player-dot" style="background:${p.color}"></div>
                    <span>${medal}${p.name}</span>
                    <span class="hist-player-score ${tClass}">${relStr(p.rel)}</span>
                </div>`;
            }).join('');
            return `<div class="history-item">
                <div class="hist-top">
                    <div><div class="hist-course">${r.course}</div><div class="hist-meta">${r.date} · ${r.thru} holes</div></div>
                    <button class="hist-delete" onclick="deleteHistory(${actualIdx})">×</button>
                </div>
                <div class="hist-players">${playerHtml}</div>
            </div>`;
        }).join('');

        const legacyHtml = legacy.slice().reverse().map(r => {
            const tClass = r.rel < 0 ? 'chip-under' : r.rel > 0 ? 'chip-over' : 'chip-even';
            return `<div class="history-item">
                <div class="hist-top">
                    <div><div class="hist-course">${r.course} <span style="font-size:0.65rem;color:var(--text3);">(solo)</span></div>
                    <div class="hist-meta">${r.date} · ${r.thru} holes · ${r.total} strokes</div></div>
                </div>
                <div class="hist-players"><div class="hist-player"><span class="hist-player-score ${tClass}">${relStr(r.rel)}</span></div></div>
            </div>`;
        }).join('');

        el.innerHTML = newHtml + legacyHtml;
    }

    /* ═══════════════════════════════════════════
       SETUP MODAL
    ═══════════════════════════════════════════ */
    let setupPlayerCount = 2;

    function openSetupModal(isEdit) {
        document.getElementById('setupTitle').textContent = isEdit ? 'Change Players' : 'New Round';
        setupPlayerCount = round ? round.players.length : 2;
        document.getElementById('setupCourse').value = round ? round.course : 'Home Course';
        updateCountButtons();
        buildPlayerInputs();
        document.getElementById('setupOverlay').classList.add('active');
    }

    function setPlayerCount(n) {
        setupPlayerCount = Math.max(2, Math.min(10, n));
        updateCountButtons();
        buildPlayerInputs();
    }

    function updateCountButtons() {
        const disp = document.getElementById('countDisplay');
        const dec  = document.getElementById('countDecBtn');
        const inc  = document.getElementById('countIncBtn');
        if (disp) disp.textContent = setupPlayerCount + ' Player' + (setupPlayerCount !== 1 ? 's' : '');
        if (dec)  dec.disabled  = setupPlayerCount <= 2;
        if (inc)  inc.disabled  = setupPlayerCount >= 10;
    }

    function buildPlayerInputs() {
        const defaults = ['Brian', 'Reese', 'Jacob', 'Dylan', 'Jake', 'Player 5', 'Player 6', 'Player 7', 'Player 8', 'Player 9'];
        const existing = round ? round.players : [];
        const container = document.getElementById('playerInputs');
        container.innerHTML = '';
        for (let i = 0; i < setupPlayerCount; i++) {
            const name = existing[i] || defaults[i] || ('Player ' + (i + 1));
            const color = PLAYER_COLORS[i];
            const photo = getAvatar(name);
            const initial = `<span style="font-family:'Outfit',sans-serif;font-weight:800;font-size:0.88rem;color:${color};">${name.charAt(0).toUpperCase()}</span>`;
            const row = document.createElement('div');
            row.className = 'player-input-row';
            row.innerHTML = `
                <div class="setup-avatar" id="sAvatar${i}" style="border-color:${color};" onclick="triggerAvatarUpload(${i})">
                    ${photo ? `<img src="${photo}" alt="">` : initial}
                    <span class="setup-avatar-cam">📷</span>
                </div>
                <input type="file" id="avatarInput${i}" accept="image/*" capture="user" style="display:none" onchange="handleAvatarUpload(${i}, event)">
                <input class="player-name-input" type="text" placeholder="Player ${i+1}" value="${name}" maxlength="20" id="pName${i}" oninput="updateSetupAvatar(${i})">`;
            container.appendChild(row);
        }
        // Focus first input
        setTimeout(() => { const f = document.getElementById('pName0'); if (f) f.focus(); }, 150);
    }

    function startRound() {
        const course = document.getElementById('setupCourse').value.trim() || 'Home Course';
        const players = [];
        for (let i = 0; i < setupPlayerCount; i++) {
            const inp = document.getElementById('pName' + i);
            players.push(inp ? inp.value.trim() || ('Player ' + (i + 1)) : ('Player ' + (i + 1)));
        }
        round = defaultRound(players, course);
        saveState();
        document.getElementById('setupOverlay').classList.remove('active');
        render();
    }

    /* ═══════════════════════════════════════════
       HOLE MODAL
    ═══════════════════════════════════════════ */
    function openHoleModal(idx) {
        activeHoleIdx = idx;
        const h = round.holes[idx];
        modalPar = h.par;
        modalScores = [...h.scores];
        document.getElementById('modalHoleNum').textContent = 'Hole ' + h.num;
        updateParButtons();
        buildPlayerScoreRows();
        document.getElementById('holeOverlay').classList.add('active');
    }

    function handleHoleOverlayClick(e) {
        if (e.target === document.getElementById('holeOverlay')) closeHoleModal();
    }

    function closeHoleModal() {
        document.getElementById('holeOverlay').classList.remove('active');
        activeHoleIdx = null;
    }

    function setModalPar(p) {
        modalPar = p;
        updateParButtons();
        buildPlayerScoreRows();
    }

    function updateParButtons() {
        [3, 4, 5].forEach(p => {
            document.getElementById('parBtn' + p).classList.toggle('active', modalPar === p);
        });
        document.getElementById('modalHolePar').textContent = 'Par ' + modalPar;
    }

    function buildPlayerScoreRows() {
        const container = document.getElementById('playerScoreRows');
        container.innerHTML = round.players.map((name, pi) => `
            <div class="player-score-row" id="psRow${pi}">
                <div class="psr-dot" style="background:${PLAYER_COLORS[pi]}"></div>
                <div class="psr-name">${name}</div>
                <div class="psr-adj" onclick="adjPlayerScore(${pi}, -1)">−</div>
                <div class="psr-score-wrap">
                    <div class="psr-score ${modalScores[pi] === null ? 'empty' : ''}" id="psScore${pi}">
                        ${modalScores[pi] !== null ? modalScores[pi] : '—'}
                    </div>
                    <div class="psr-label" id="psLabel${pi}"></div>
                </div>
                <div class="psr-adj" onclick="adjPlayerScore(${pi}, +1)">+</div>
            </div>`).join('');
        round.players.forEach((_, pi) => updatePlayerScoreDisplay(pi));
    }

    function adjPlayerScore(pi, delta) {
        const cur = modalScores[pi] === null ? modalPar : modalScores[pi];
        modalScores[pi] = Math.max(1, cur + delta);
        updatePlayerScoreDisplay(pi);
    }

    function updatePlayerScoreDisplay(pi) {
        const scoreEl = document.getElementById('psScore' + pi);
        const labelEl = document.getElementById('psLabel' + pi);
        const sc = modalScores[pi];
        if (!scoreEl) return;
        if (sc === null) {
            scoreEl.textContent = '—'; scoreEl.className = 'psr-score empty';
            labelEl.textContent = ''; labelEl.className = 'psr-label';
        } else {
            scoreEl.textContent = sc; scoreEl.className = 'psr-score';
            const text = scoreLabelText(sc, modalPar);
            labelEl.textContent = text;
            const cls = scoreClass(sc, modalPar);
            const lblMap = { hio:'lbl-hio', eagle:'lbl-eagle', birdie:'lbl-birdie', par:'lbl-par', bogey:'lbl-bogey', double:'lbl-dbl' };
            labelEl.className = 'psr-label ' + (lblMap[cls] || '');
        }
    }

    function clearAllScores() {
        modalScores = round.players.map(() => null);
        buildPlayerScoreRows();
    }

    function confirmHole() {
        if (activeHoleIdx === null) return;
        const h = round.holes[activeHoleIdx];
        const prevScores = [...h.scores];
        const prevPar = h.par;
        h.par = modalPar;
        h.scores = [...modalScores];
        saveState();
        closeHoleModal();
        render();

        // Fire confetti for new good scores
        round.players.forEach((_, pi) => {
            const prev = prevScores[pi];
            const cur  = h.scores[pi];
            if (cur === null) return;
            const wasGood  = prev !== null && (prev === 1 || prev - prevPar <= -1);
            const isGood   = cur === 1 || cur - h.par <= -1;
            if (isGood && !wasGood) {
                const level = cur === 1 ? 'hio' : cur - h.par <= -2 ? 'eagle' : 'birdie';
                setTimeout(() => launchConfetti(level), pi * 180);
            }
        });
    }

    /* ═══════════════════════════════════════════
       COURSE MODAL
    ═══════════════════════════════════════════ */
    function openCourseModal() {
        document.getElementById('courseInput').value = round ? round.course : '';
        document.getElementById('courseOverlay').classList.add('active');
        setTimeout(() => document.getElementById('courseInput').focus(), 100);
    }
    function handleCourseOverlayClick(e) {
        if (e.target === document.getElementById('courseOverlay')) closeCourseModal();
    }
    function closeCourseModal() { document.getElementById('courseOverlay').classList.remove('active'); }
    function saveCourse() {
        const val = document.getElementById('courseInput').value.trim();
        if (val && round) { round.course = val; saveState(); render(); }
        closeCourseModal();
    }
    document.getElementById('courseInput').addEventListener('keydown', e => { if (e.key === 'Enter') saveCourse(); });

    /* ═══════════════════════════════════════════
       SAVE / NEW ROUND
    ═══════════════════════════════════════════ */
    /* ═══════════════════════════════════════════
       AVATARS
    ═══════════════════════════════════════════ */
    function getAvatarKey(name) { return 'dg_av_' + name.toLowerCase().replace(/\s+/g,'_'); }
    function saveAvatar(name, dataUrl) { try { localStorage.setItem(getAvatarKey(name), dataUrl); } catch {} }
    function getAvatar(name) { return localStorage.getItem(getAvatarKey(name)); }

    function avatarHtml(name, color, size) {
        const photo = getAvatar(name);
        const s = `width:${size}px;height:${size}px;border-radius:50%;flex-shrink:0;border:2px solid ${color};`;
        if (photo) return `<img style="${s}object-fit:cover;" src="${photo}" alt="${name[0]}">`;
        const fs = Math.max(8, Math.round(size * 0.38));
        return `<div style="${s}background:${color}22;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-weight:800;font-size:${fs}px;color:${color};">${name.charAt(0).toUpperCase()}</div>`;
    }

    function triggerAvatarUpload(i) { document.getElementById('avatarInput' + i).click(); }

    function handleAvatarUpload(i, event) {
        const file = event.target.files[0];
        if (!file) return;
        compressImage(file, dataUrl => {
            const nameEl = document.getElementById('pName' + i);
            const name = nameEl ? (nameEl.value.trim() || ('Player '+(i+1))) : ('Player '+(i+1));
            saveAvatar(name, dataUrl);
            updateSetupAvatar(i);
        });
        event.target.value = '';
    }

    function updateSetupAvatar(i) {
        const nameEl = document.getElementById('pName' + i);
        if (!nameEl) return;
        const name = nameEl.value.trim() || ('Player '+(i+1));
        const color = PLAYER_COLORS[i];
        const photo = getAvatar(name);
        const av = document.getElementById('sAvatar' + i);
        if (!av) return;
        av.style.borderColor = color;
        const initial = `<span style="font-family:'Outfit',sans-serif;font-weight:800;font-size:0.88rem;color:${color};">${name.charAt(0).toUpperCase()}</span>`;
        av.innerHTML = (photo ? `<img src="${photo}" alt="">` : initial) + '<span class="setup-avatar-cam">📷</span>';
    }

    function compressImage(file, callback) {
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const size = 150; canvas.width = size; canvas.height = size;
                const ctx = canvas.getContext('2d');
                const min = Math.min(img.width, img.height);
                ctx.drawImage(img, (img.width-min)/2, (img.height-min)/2, min, min, 0, 0, size, size);
                callback(canvas.toDataURL('image/jpeg', 0.72));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    /* ═══════════════════════════════════════════
       WINNER MODAL
    ═══════════════════════════════════════════ */
    let pendingSave = null;

    function saveRound() { showWinnerModal(); }

    function showWinnerModal() {
        const totalHoles = round.holes.filter(h => h.scores.some(s => s !== null)).length;
        if (totalHoles === 0) { alert('Score at least one hole first.'); return; }

        const playerResults = round.players.map((name, i) => {
            const t = playerTotals(i);
            return { name, color: PLAYER_COLORS[i], ...t };
        });
        const ranked = [...playerResults].sort((a, b) => {
            if (a.thru === 0 && b.thru === 0) return 0;
            if (a.thru === 0) return 1;
            if (b.thru === 0) return -1;
            return a.rel - b.rel;
        });
        const winner = ranked[0];

        document.getElementById('wWinnerName').textContent = winner.thru > 0 ? winner.name : '—';
        // Winner avatar
        const wAvEl = document.getElementById('wWinnerAvatar');
        if (wAvEl) {
            const wPhoto = winner.thru > 0 ? getAvatar(winner.name) : null;
            const wColor2 = PLAYER_COLORS[ranked.indexOf(winner)];
            if (wPhoto) {
                wAvEl.innerHTML = `<div style="position:relative;display:inline-block;margin-bottom:10px;">
                    <img style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid rgba(251,191,36,0.5);" src="${wPhoto}">
                    <div style="position:absolute;top:-10px;right:-8px;font-size:1.5rem;line-height:1;filter:drop-shadow(0 1px 4px rgba(0,0,0,0.6));">👑</div>
                </div>`;
            } else {
                wAvEl.innerHTML = '<div class="winner-crown">🏆</div>';
            }
        }
        const wScore = winner.thru > 0 ? relStr(winner.rel) : '—';
        const wColor = winner.thru > 0 ? (winner.rel < 0 ? 'var(--green)' : winner.rel > 0 ? 'var(--red2)' : 'var(--text2)') : 'var(--text3)';
        const wScoreEl = document.getElementById('wWinnerScore');
        wScoreEl.textContent = wScore;
        wScoreEl.style.color = wColor;

        const rankIcons = ['🥇','🥈','🥉','4th','5th','6th','7th','8th','9th','10th'];
        document.getElementById('wLeaderboard').innerHTML = ranked.map((p, ri) => {
            const t = p.thru > 0 ? relStr(p.rel) : '—';
            const tColor = p.thru === 0 ? 'var(--text3)' : p.rel < 0 ? 'var(--green)' : p.rel > 0 ? 'var(--red2)' : 'var(--text2)';
            return `<div class="winner-lb-row ${ri === 0 && ranked.length > 1 && p.thru > 0 ? 'w-top' : ''}">
                <div class="winner-lb-rank">${rankIcons[ri] || (ri+1)}</div>
                <div class="winner-lb-dot" style="background:${p.color}"></div>
                <div class="winner-lb-name">${p.name}</div>
                <div class="winner-lb-score" style="color:${tColor}">${t}</div>
                <div class="winner-lb-thru">${p.thru > 0 ? p.strokes + ' · ' + p.thru + 'h' : '—'}</div>
            </div>`;
        }).join('');

        pendingSave = {
            course: round.course,
            date: new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }),
            thru: totalHoles,
            players: [...round.players],
            playerResults,
            winner: winner.name,
            holes: round.holes.map(h => ({ par: h.par, scores: [...h.scores] }))
        };

        document.getElementById('winnerOverlay').classList.add('active');
        const level = winner.rel <= -4 ? 'hio' : winner.rel <= -2 ? 'eagle' : 'birdie';
        launchConfetti(level);
        setTimeout(() => launchConfetti('birdie'), 500);
    }

    function commitSave() {
        if (!pendingSave) return;
        history.push(pendingSave);
        saveHistory();
        renderHistory();
        pendingSave = null;
        document.getElementById('winnerOverlay').classList.remove('active');
    }

    function closeWinner() {
        pendingSave = null;
        document.getElementById('winnerOverlay').classList.remove('active');
    }

    function confirmNewRound() {
        const totalHoles = round ? round.holes.filter(h => h.scores.some(s => s !== null)).length : 0;
        if (totalHoles > 0 && !confirm('Start a new round? Current scores will be cleared.')) return;
        openSetupModal(false);
    }

    function deleteHistory(idx) {
        if (!confirm('Delete this round?')) return;
        history.splice(idx, 1);
        saveHistory();
        renderHistory();
    }

    /* ═══════════════════════════════════════════
       TABLE TOGGLE
    ═══════════════════════════════════════════ */
    function toggleTable() {
        tableVisible = !tableVisible;
        document.getElementById('tableToggleBtn').textContent = tableVisible ? 'Hide' : 'Show';
        renderTable();
    }

    /* ═══════════════════════════════════════════
       CONFETTI
    ═══════════════════════════════════════════ */
    function launchConfetti(level) {
        const palettes = {
            hio:    ['#fbbf24','#f59e0b','#fde68a','#fff','#f97316'],
            eagle:  ['#34d399','#10b981','#6ee7b7','#fff','#a7f3d0'],
            birdie: ['#4ade80','#22d3ee','#818cf8','#c084fc','#fff']
        };
        const colors = palettes[level] || palettes.birdie;
        const count  = level === 'hio' ? 80 : level === 'eagle' ? 60 : 40;
        for (let i = 0; i < count; i++) {
            setTimeout(() => {
                const el = document.createElement('div');
                el.className = 'confetti-piece';
                const size = 6 + Math.random() * 8;
                el.style.cssText =
                    'width:' + size + 'px;height:' + size + 'px;' +
                    'border-radius:' + (Math.random() > 0.5 ? '50%' : '2px') + ';' +
                    'background:' + colors[Math.floor(Math.random() * colors.length)] + ';' +
                    'left:' + (5 + Math.random() * 90) + 'vw;top:-20px;' +
                    '--dur:' + (0.9 + Math.random() * 0.8) + 's;' +
                    '--delay:' + (Math.random() * 0.3) + 's;' +
                    '--rot:' + (Math.random() > 0.5 ? '' : '-') + (360 + Math.random() * 360) + 'deg;';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 2200);
            }, i * 20);
        }
    }

    /* ═══════════════════════════════════════════
       INIT
    ═══════════════════════════════════════════ */
    loadHistory();
    if (!loadState()) {
        openSetupModal(false);
    } else {
        render();
    }
</script>
